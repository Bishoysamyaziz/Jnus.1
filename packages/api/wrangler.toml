name = "oneagent-os-api"
main = "main.py"
compatibility_date = "2024-12-01"
compatibility_flags = ["python_workers"]

[env.production]
vars = { ENVIRONMENT = "production" }

[[services]]
binding = "AI"
service = "ai"

[[d1_databases]]
binding = "DB"
database_name = "oneagent-os"
database_id = ""

[triggers]
crons = ["*/5 * * * *"]

# ═══════════════════════════════════════════════════════════════════
# OneAgent OS — 24 Agent Docker Compose (Isolated Containers)
# ═══════════════════════════════════════════════════════════════════
# Each agent runs in its own container with only its own dependencies.
# No dependency conflicts between agents.
# ═══════════════════════════════════════════════════════════════════

services:
  agent-crewai:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.crewai
    ports: ["8101:8000"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - oneagent-net


services:
  - type: web
    name: oneagent-os-api
    runtime: python
    repo: https://github.com/Bishoysamyaziz/Jnus.1
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn packages.api.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
